<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>FuelOS — Wireframes</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Caveat:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; background: #f5f5f4; font-family: Inter, system-ui, sans-serif; color: #1a1a1a; }
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(245, 245, 244, 0.9);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid #e7e5e4;
    padding: 14px 24px;
    display: flex; align-items: center; gap: 24px;
  }
  .brand { display: flex; align-items: center; gap: 10px; font-weight: 600; }
  .brand-mark { width: 28px; height: 28px; border-radius: 6px; background: oklch(0.72 0.16 50); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; }
  .crumb { font-family: 'Caveat', cursive; color: #737373; font-size: 18px; margin-left: 8px; }
  .tabs { display: flex; gap: 2px; background: #e7e5e4; padding: 3px; border-radius: 8px; }
  .tab {
    padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer;
    color: #525252;
  }
  .tab.active { background: white; color: #1a1a1a; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
  .surface-pad { padding: 40px; overflow-x: auto; }
  .surface-intro { font-family: 'Caveat', cursive; color: oklch(0.72 0.16 50); font-size: 22px; max-width: 760px; margin-bottom: 24px; line-height: 1.3; }
  .surface-meta { font-size: 11px; color: #737373; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
</style>
</head>
<body>

<template id="__bundler_thumbnail" data-bg-color="#f5f5f4">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect x="120" y="180" width="960" height="60" rx="10" fill="#e7e5e4"/>
    <rect x="120" y="280" width="280" height="340" rx="14" fill="#ffffff" stroke="#d6d3d1" stroke-width="3"/>
    <rect x="460" y="280" width="280" height="340" rx="14" fill="#ffffff" stroke="#d6d3d1" stroke-width="3"/>
    <rect x="800" y="280" width="280" height="340" rx="14" fill="#ffffff" stroke="#d6d3d1" stroke-width="3"/>
    <circle cx="600" cy="120" r="44" fill="oklch(0.72 0.16 50)"/>
    <text x="600" y="135" font-family="Inter, sans-serif" font-size="36" font-weight="700" fill="white" text-anchor="middle">F</text>
    <text x="600" y="720" font-family="Caveat, cursive" font-size="44" fill="oklch(0.72 0.16 50)" text-anchor="middle">FuelOS — wireframes</text>
  </svg>
</template>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="wireframe-primitives.jsx"></script>
<script type="text/babel" src="surfaces/dashboard.jsx"></script>
<script type="text/babel" src="surfaces/plan-builder.jsx"></script>
<script type="text/babel" src="surfaces/prep.jsx"></script>
<script type="text/babel" src="surfaces/race.jsx"></script>
<script type="text/babel" src="surfaces/debrief.jsx"></script>
<script type="text/babel" src="surfaces/rest.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "sport": "run",
  "length": "medium",
  "daynight": "day",
  "units": "metric",
  "annotations": true
}/*EDITMODE-END*/;

const SURFACES = [
  { id: 'dashboard', name: 'Dashboard', intro: '8 surfaces · 4 variations each. The dashboard is the entry point — what does an athlete see when they open the app between races?' , Comp: () => null },
  { id: 'plan',      name: 'Plan builder', intro: 'Build a fueling plan adapted to event, profile, and constraints. Most desktop time happens here.', Comp: () => null },
  { id: 'prep',      name: 'Prep & protocol', intro: 'The 14 days before the race — checklists, carb load, deload, packing the drop bag.', Comp: () => null },
  { id: 'race',      name: 'Race day · live', intro: 'Mobile-first. Map + fuel stops along the route is the hypothesis you picked.', Comp: () => null },
  { id: 'debrief',   name: 'Post-race debrief', intro: 'Right after the race — turn what happened into a lesson for next time.', Comp: () => null },
  { id: 'history',   name: 'History', intro: 'Every race ever, searchable & comparable. The data layer that makes future plans smarter.', Comp: () => null },
  { id: 'profile',   name: 'Profile', intro: 'Who you are as a fueling athlete — body, gut, preferences, evolving over time.', Comp: () => null },
  { id: 'integrations', name: 'Integrations', intro: 'Strava, Garmin, Wahoo, Apple Health. Optional, but accelerate every other surface.', Comp: () => null },
];

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [active, setActive] = React.useState('dashboard');

  const surface = SURFACES.find(s => s.id === active);
  const Comps = {
    dashboard: window.S_Dashboard,
    plan: window.S_PlanBuilder,
    prep: window.S_Prep,
    race: window.S_Race,
    debrief: window.S_Debrief,
    history: window.S_History,
    profile: window.S_Profile,
    integrations: window.S_Integrations,
  };
  const Active = Comps[active];

  return (
    <div data-screen-label={surface.name}>
      <div className="topbar">
        <div className="brand">
          <div className="brand-mark">F</div>
          <span>FuelOS</span>
          <span className="crumb">— wireframes</span>
        </div>
        <div className="tabs" style={{ marginLeft: 'auto', overflowX: 'auto' }}>
          {SURFACES.map(s => (
            <div key={s.id} className={'tab' + (active === s.id ? ' active' : '')} onClick={() => setActive(s.id)}>
              {s.name}
            </div>
          ))}
        </div>
      </div>

      <div className="surface-pad" data-screen-label={surface.name}>
        <div className="surface-meta">surface · {SURFACES.findIndex(s => s.id === active) + 1} of 8</div>
        <h1 style={{ fontSize: 28, fontWeight: 700, margin: '0 0 8px' }}>{surface.name}</h1>
        <div className="surface-intro">{surface.intro}</div>
        {Active && <Active tweaks={t} />}
      </div>

      <TweaksPanel title="Wireframe tweaks">
        <TweakSection label="Race profile" />
        <TweakRadio label="Sport"
          value={t.sport}
          options={[{value:'run',label:'Run'},{value:'bike',label:'Bike'},{value:'tri',label:'Tri'}]}
          onChange={(v) => setTweak('sport', v)} />
        <TweakRadio label="Length"
          value={t.length}
          options={[{value:'short',label:'1h'},{value:'medium',label:'4h'},{value:'long',label:'12h'}]}
          onChange={(v) => setTweak('length', v)} />
        <TweakSection label="Display" />
        <TweakRadio label="Race-day mode"
          value={t.daynight}
          options={[{value:'day',label:'Day'},{value:'night',label:'Night'}]}
          onChange={(v) => setTweak('daynight', v)} />
        <TweakRadio label="Units"
          value={t.units}
          options={[{value:'metric',label:'Metric'},{value:'imperial',label:'Imperial'}]}
          onChange={(v) => setTweak('units', v)} />
        <TweakToggle label="Designer annotations"
          value={t.annotations}
          onChange={(v) => setTweak('annotations', v)} />
      </TweaksPanel>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>

</body>
</html>
